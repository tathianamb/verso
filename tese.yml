name: Compilar tese

# Compila a tese a cada push e disponibiliza o PDF.
# Caminho 100% gratuito: roda num Ubuntu com TeX Live completo,
# então abnTeX2, biber e selos EPS funcionam sem configuração extra.

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:        # permite rodar manualmente pelo botão "Run workflow"

# necessário pra action criar/atualizar a Release com o PDF
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Compilar main.tex
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          # latexmk cuida do ciclo pdflatex -> bibtex/biber -> pdflatex x2
          latexmk_use_xelatex: false
          args: -pdf -file-line-error -interaction=nonstopmode -halt-on-error
          # abnTeX2 e o ccicons já vêm no scheme-full da imagem da action.
          # Se algum pacote faltar, descomente e ajuste:
          # extra_system_packages: "py-pygments"

      - name: Publicar o PDF como artefato
        uses: actions/upload-artifact@v4
        with:
          name: tese-pdf
          path: main.pdf

      # Opcional: publicar o PDF numa Release fixa pra ter URL estável
      # que o app Lavoura pode embutir no preview.
      - name: Publicar em Release "ultimo-pdf"
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ultimo-pdf
          files: main.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
