<style>
  /* ---------- design tokens ---------- */
  :root{
    --ink:#11201d;
    --paper:#f3efe4;
    --paper-2:#e9e3d3;
    --line:#cdc4ad;
    --tex:#0f6b5c;
    --tex-deep:#0f2e2a;
    --amber:#b5641e;
    --muted:#5d6660;
    --sel:#cfe4dd;
    --mono:"SFMono-Regular",ui-monospace,"JetBrains Mono","Cascadia Code",Menlo,Consolas,monospace;
    --serif:"Iowan Old Style","Palatino Linotype","Book Antiqua",Palatino,Georgia,serif;
    --sans:ui-sans-serif,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:var(--sans);
    color:var(--ink);
    background:var(--tex-deep);
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;cursor:pointer}
  ::selection{background:var(--sel)}

  /* ---------- app shell ---------- */
  /* Sem topbar: layout é só as colunas em altura total */
  .app{display:grid;grid-template-rows:1fr;height:100%;height:100dvh}

  /* ---------- dropdown menus ---------- */
  .dd-wrap{position:relative;display:inline-flex}
  .dd-trigger{
    background:#11423b;color:var(--paper);border:1px solid #1c5a50;
    padding:6px 11px;border-radius:7px;font-size:12px;font-weight:600;
    display:inline-flex;align-items:center;gap:5px;transition:.15s;
    white-space:nowrap;
  }
  .dd-trigger:hover{background:#185d52;border-color:#2a7568}
  .dd-trigger .arr{font-size:9px;opacity:.7;margin-left:1px}
  .dd-menu{
    position:absolute;top:calc(100% + 5px);left:0;z-index:60;
    background:var(--tex-deep);border:1px solid #1c5a50;border-radius:9px;
    padding:5px;box-shadow:0 12px 30px rgba(0,0,0,.45);
    min-width:170px;display:none;flex-direction:column;gap:2px;
  }
  .dd-menu.open{display:flex}
  .dd-item{
    background:none;border:0;color:var(--paper);
    padding:7px 11px;border-radius:6px;font-size:12px;font-weight:500;
    text-align:left;display:flex;align-items:center;gap:8px;transition:.12s;
    white-space:nowrap;
  }
  .dd-item:hover{background:#11423b}
  .dd-item .di{font-size:13px;width:16px;text-align:center}
  .dd-sep{height:1px;background:#1c5a50;margin:3px 0}

  /* ---------- body columns ---------- */
  .cols{
    display:grid;
    /* larguras redimensionáveis via --w1/--w2; o restante vai pro PDF */
    grid-template-columns:var(--w1,220px) var(--w2,1fr) 1fr;
    min-height:0;height:100%;position:relative;overflow:hidden;
    background:var(--paper);
  }
  .pane{display:flex;flex-direction:column;min-width:0;min-height:0;overflow:hidden}
  .pane.files{background:var(--tex-deep);border-right:1px solid #06403a}
  .pane.editor{border-right:1px solid var(--line)}

  /* ---------- resize handles ---------- */
  .resize-handle{
    position:absolute;top:0;bottom:0;width:5px;cursor:col-resize;
    background:transparent;z-index:20;transition:background .15s;
  }
  .resize-handle:hover,.resize-handle.dragging{background:#7fd8c6;opacity:.5}

  /* ---------- file pane: header with actions + tree ---------- */
  .files-header{
    padding:10px 10px 8px;
    border-bottom:1px solid #06403a;
    background:var(--tex-deep);
    display:flex;flex-direction:column;gap:7px;
    flex-shrink:0;
  }
  .files-brand{
    display:flex;align-items:baseline;gap:7px;user-select:none;
  }
  .files-brand .mark{
    font-family:var(--serif);font-style:italic;font-size:17px;letter-spacing:.3px;color:#fff;
  }
  .files-brand .mark b{color:#7fd8c6;font-style:normal;font-weight:700}
  .files-brand .sub{font-size:9px;color:#8fb3ab;letter-spacing:.13em;text-transform:uppercase}
  .files-actions{display:flex;gap:10px;align-items:center;padding:4px 0 2px}

  /* icon buttons — large circular SVG style */
  .ibtn{
    background:none;border:none;padding:0;
    color:#fff;opacity:.75;
    display:inline-flex;align-items:center;justify-content:center;
    width:36px;height:36px;border-radius:50%;transition:.15s;
    flex-shrink:0;
  }
  .ibtn:hover{opacity:1;background:rgba(255,255,255,.1)}
  .ibtn:active{background:rgba(255,255,255,.16)}
  .ibtn:disabled{opacity:.25;cursor:not-allowed}
  .ibtn svg{width:26px;height:26px;display:block}

  /* dd trigger as icon button inside files pane */
  .files-header .dd-trigger{
    background:none;border:none;padding:0;
    color:#fff;opacity:.75;
    display:inline-flex;align-items:center;justify-content:center;
    width:36px;height:36px;border-radius:50%;transition:.15s;
    flex-shrink:0;
  }
  .files-header .dd-trigger:hover{opacity:1;background:rgba(255,255,255,.1)}
  .files-header .dd-trigger svg{width:26px;height:26px;display:block}
  .files-header .dd-trigger .arr{display:none}

  /* ---------- file tree ---------- */
  .tree{overflow:auto;flex:1;padding:6px 0}
  .grp{padding:9px 14px 3px;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#8fb3ab}
  .fitem{
    display:flex;align-items:center;gap:8px;padding:6px 14px 6px 18px;
    font-size:13px;color:#fff;border-left:3px solid transparent;
  }
  .fitem:hover{background:#11423b}
  .fitem.active{background:#0f6b5c;border-left-color:#7fd8c6;font-weight:600;color:#fff}
  .fitem .ic{font-size:13px;color:#7fd8c6;width:16px;text-align:center;line-height:1}
  .fitem.missing{color:#f5a96e}
  .fitem.missing .ic{color:#f5a96e}
  .fitem small{margin-left:auto;color:#8fb3ab;font-size:10px}

  /* ---------- editor header ---------- */
  .ed-head{
    display:flex;align-items:center;gap:10px;padding:7px 12px;
    border-bottom:1px solid #06403a;background:var(--tex-deep);
    flex-shrink:0;
  }
  .crumb{font-family:var(--mono);font-size:12px;color:#8fb3ab;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .crumb b{color:#fff}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--amber);opacity:0;flex-shrink:0}
  .dot.on{opacity:1}
  .editor-wrap{flex:1;min-height:0;overflow:hidden;background:#fbfaf5}
  .CodeMirror{height:100%!important;font-family:var(--mono);font-size:13.5px;line-height:1.65}
  .CodeMirror-gutters{background:#f1ece0;border-right:1px solid var(--line)}
  .cm-s-verso.CodeMirror{background:#fbfaf5;color:#26302c}
  .cm-s-verso .CodeMirror-cursor{border-left:2px solid var(--tex)}
  .cm-s-verso .CodeMirror-selected{background:var(--sel)!important}
  .cm-s-verso .CodeMirror-linenumber{color:#b3a988}
  .cm-s-verso .cm-tex-cmd{color:var(--tex);font-weight:600}
  .cm-s-verso .cm-tex-brace{color:#9a7b2e}
  .cm-s-verso .cm-tex-math{color:#7a3ea8}
  .cm-s-verso .cm-tex-comment{color:#9c947f;font-style:italic}
  .cm-s-verso .cm-tex-env{color:#b5641e;font-weight:600}

  /* ---------- preview ---------- */
  .pane.preview{background:#dad3c2;display:flex;flex-direction:column}
  .preview-head{
    display:flex;align-items:center;gap:8px;padding:7px 12px;
    border-bottom:1px solid #06403a;background:var(--tex-deep);flex-shrink:0;
  }
  .preview-title{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:#8fb3ab;font-weight:700;flex:1}
  .pbtn{
    background:#b8b0a0;color:var(--ink);border:1px solid #a8a090;
    padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600;
    display:inline-flex;align-items:center;gap:5px;transition:.13s;white-space:nowrap;
  }
  .pbtn:hover{background:#a8a090}
  .pbtn.primary{background:var(--tex);color:#fff;border-color:#13a48c}
  .pbtn.primary:hover{background:#13a48c}
  .pbtn:disabled{opacity:.45;cursor:not-allowed}
  .pbtn .arr{font-size:9px;opacity:.7}

  /* compile dropdown inside preview header — dark theme */
  .preview-head .dd-trigger{
    background:var(--tex);color:#fff;border-color:#13a48c;
    font-size:12px;padding:5px 11px;
  }
  .preview-head .dd-trigger:hover{background:#13a48c}

  .preview .ph{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;color:var(--muted);padding:30px;gap:14px;
  }
  .preview .ph .big{font-family:var(--serif);font-size:21px;color:var(--ink)}
  .preview .ph code{font-family:var(--mono);font-size:12px;background:#cfc8b5;padding:2px 6px;border-radius:4px}
  .pdfframe{flex:1;border:0;width:100%;background:#cfc8b5;min-height:0}

  /* ---------- log (collapsible) ---------- */
  #log{
    font-family:var(--mono);font-size:11.5px;line-height:1.5;color:#2c3531;
    background:#efe9db;border-top:1px solid var(--line);
    padding:10px 14px;height:0;overflow:auto;white-space:pre-wrap;
    transition:height .2s ease;flex-shrink:0;
  }
  #log.open{height:200px}
  #log .err{color:#a3331b}
  #log .ok{color:#1d6b4f}
  #log .warn{color:#9a6411}
  .log-toggle{
    background:none;border:none;color:#8fb3ab;font-size:11px;
    padding:3px 6px;border-radius:4px;transition:.13s;display:inline-flex;align-items:center;gap:4px;
    font-family:var(--mono);
  }
  .log-toggle:hover{background:rgba(255,255,255,.08);color:#fff}
  .log-toggle .lt-arrow{transition:transform .2s;display:inline-block}
  .log-toggle.log-open .lt-arrow{transform:rotate(180deg)}

  /* ---------- mobile tabbar ---------- */
  .tabbar{display:none}
  @media (max-width:880px){
    .app{grid-template-rows:1fr auto}
    .tabbar{
      display:flex;z-index:30;
      background:var(--tex-deep);border-top:1px solid #06403a;
    }
    .tabbar button{
      flex:1;background:none;border:0;color:#8fb3ab;padding:9px;font-size:11px;
      display:flex;flex-direction:column;align-items:center;gap:3px;font-weight:600;
    }
    .tabbar button.active{color:#7fd8c6}
    .tabbar button .ti{font-size:16px}
    .cols{grid-template-columns:1fr}
    .pane{grid-column:1;grid-row:1}
    .pane.files,.pane.preview{display:none}
    .cols.show-files .pane.editor{display:none}
    .cols.show-files .pane.files{display:flex}
    .cols.show-preview .pane.editor{display:none}
    .cols.show-preview .pane.preview{display:flex}
    .resize-handle{display:none}
  }

  .toast{
    position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:var(--paper);padding:10px 18px;border-radius:9px;
    font-size:13px;opacity:0;transition:.25s;z-index:50;pointer-events:none;
    box-shadow:0 8px 26px rgba(0,0,0,.3);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media (max-width:880px){.toast{bottom:72px}}
</style>

<div class="app">
  <div class="cols" id="cols">

    <!-- ===== COLUNA 1: Arquivos ===== -->
    <aside class="pane files">
      <div class="files-header">
        <div class="files-brand">
          <span class="mark"><b>V</b>erso</span>
          <span class="sub">editor LaTeX</span>
        </div>
        <div class="files-actions">
          <!-- GitHub dropdown icon -->
          <div class="dd-wrap" id="ghWrap">
            <button class="dd-trigger" id="btnGhDrop" title="GitHub">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
              </svg>

              <button class="dd-item" id="btnRepo"><span class="di">🔗</span>Conectar GitHub</button>
              <button class="dd-item" id="btnPull"><span class="di">⬇</span>Sincronizar</button>
            </div>
          </div>
          <!-- Importar ZIP -->

        </div>
      </div>

    <!-- resize handle 1 (files | editor) -->

    <!-- ===== COLUNA 2: Editor ===== -->
    <section class="pane editor">
      <div class="ed-head">

    <!-- resize handle 2 (editor | preview) -->

    <!-- ===== COLUNA 3: PDF Preview ===== -->

      <div class="preview-head">
        <span class="preview-title">PDF</span>
        <!-- Log toggle -->
        <button class="log-toggle" id="btnLog" title="Mostrar/ocultar console">
          Console <span class="lt-arrow">▲</span>
        </button>
        <!-- Compilar PDF dropdown -->
        <div class="dd-wrap" id="compileWrap">
          <button class="dd-trigger preview-head" id="btnCompileDrop" title="Compilar PDF (Ctrl+Enter)" style="background:var(--tex);color:#fff;border-color:#13a48c">
            ▶ Compilar PDF <span class="arr">▾</span>
          </button>
          <div class="dd-menu" id="compileMenu" style="left:auto;right:0">
            <button class="dd-item" id="btnPublish"><span class="di">🚀</span>Compilar e publicar</button>
            <div class="dd-sep"></div>
            <button class="dd-item" id="btnLoadPdf"><span class="di">📄</span>Carregar último PDF</button>
          </div>
        </div>
      </div>
      <div class="ph" id="previewPh">
        <div class="big">Escreva. Compile. Veja.</div>
        <div>Edite à esquerda e clique <code>Compilar PDF</code>.<br>
        O app commita no GitHub, o Actions compila com TeX Live<br>
        e o PDF aparece aqui — sem upload manual.</div>
        <div>Primeira vez? Use <code>GitHub → Conectar GitHub</code>.</div>

  <nav class="tabbar">

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/stex/stex.min.js"></script>
<script>
/* ============================================================
   Verso — editor LaTeX (PWA)
   ============================================================ */

/* ---------- 1. seed ---------- */
const SEED = {
  "LEIA-ME.txt": `Bem-vindo ao Verso — editor LaTeX.

Funciona com qualquer projeto LaTeX (artigo, relatório,
tese, currículo...). Nada fica embutido no app: seu token
e seus arquivos ficam só aqui no navegador (IndexedDB).

PRIMEIROS PASSOS
1. "GitHub → Conectar GitHub": informe usuário, repo, branch e token.
2. "GitHub → Sincronizar": carrega os arquivos do repo.
3. Edite à vontade. "Compilar PDF" commita as mudanças,
   o GitHub Actions compila e o PDF aparece no preview.

O arquivo-raiz é detectado automaticamente pelo
\\documentclass — não precisa se chamar main.tex.

Alternativa offline: "ZIP → Importar .zip" carrega de um
arquivo local em vez do GitHub.`,
};

let REFERENCED = [];
const TEXT_EXT=/\.(tex|bib|cls|sty|txt|md|cfg|lco|bst|ltx|gitignore)$/i;
const isText=p=>TEXT_EXT.test(p)||(/(^|\/)\.[^/]+$/.test(p)&&!/\.(jpg|jpeg|png|gif|pdf|eps|ttf|otf)$/i.test(p));

/* ---------- 2. IndexedDB ---------- */
const DB="lavoura",STORE="files";
function idb(){return new Promise((res,rej)=>{const r=indexedDB.open(DB,1);
  r.onupgradeneeded=()=>r.result.createObjectStore(STORE);
  r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
async function dbGet(k){const d=await idb();return new Promise((res,rej)=>{
  const t=d.transaction(STORE).objectStore(STORE).get(k);
  t.onsuccess=()=>res(t.result);t.onerror=()=>rej(t.error);});}
async function dbSet(k,v){const d=await idb();return new Promise((res,rej)=>{
  const t=d.transaction(STORE,"readwrite").objectStore(STORE).put(v,k);
  t.onsuccess=()=>res();t.onerror=()=>rej(t.error);});}
async function dbAll(){const d=await idb();return new Promise((res,rej)=>{
  const out={},s=d.transaction(STORE).objectStore(STORE),c=s.openCursor();
  c.onsuccess=e=>{const cur=e.target.result;if(cur){out[cur.key]=cur.value;cur.continue();}else res(out);};
  c.onerror=()=>rej(c.error);});}

/* ---------- 3. estado ---------- */
let files={};
let binaries={};
let current=null;
let rootTex=null;
let dirty=false;
const $=s=>document.querySelector(s);

function detectRoot(){
  const texs=Object.keys(files).filter(p=>p.endsWith(".tex"));
  const withClass=texs.filter(p=>/\\documentclass/.test(files[p]));
  if(withClass.length){
    rootTex=withClass.includes("main.tex")?"main.tex":withClass.sort()[0];
  }else{
    rootTex=files["main.tex"]?"main.tex":(texs.sort()[0]||null);
  }
  return rootTex;
}
function pdfName(){return rootTex?rootTex.replace(/\.tex$/,"").split("/").pop()+".pdf":"output.pdf";}

/* ---------- 4. CodeMirror ---------- */
const cm=CodeMirror.fromTextArea($("#code"),{
  mode:"stex",theme:"verso",lineNumbers:true,lineWrapping:true,
  autofocus:true,viewportMargin:Infinity,
});
cm.on("change",()=>{if(current){files[current]=cm.getValue();setDirty(true);}});
function setDirty(v){dirty=v;$("#dirtyDot").classList.toggle("on",v);}

/* ---------- 5. árvore de arquivos ---------- */
/* Ícones por tipo:
   .tex  → 🗒  (folha com escrita)
   .bib  → 📖  (livro / referência)
   .cls/.sty → ⚙  (engrenagem / configuração)
   outros → ·
*/
function fileIcon(p,missing){
  if(missing) return "⚠";
  if(p.endsWith(".tex")) return "🗒";
  if(p.endsWith(".bib")) return "📖";
  if(p.endsWith(".cls")||p.endsWith(".sty")) return "⚙";
  return "·";
}

function basename(p){return p.split("/").pop();}
function buildTree(){
  const tree=$("#tree");tree.innerHTML="";
  const groups={};
  const ROOT="\u0000raiz";
  const add=(p)=>{
    const folder=p.includes("/")?p.slice(0,p.indexOf("/")):ROOT;
    (groups[folder]||(groups[folder]=[])).push(p);
  };
  Object.keys(files).forEach(add);
  REFERENCED.forEach(p=>{if(!(p in files))add(p);});

  const addItem=(p)=>{
    const missing=!(p in files);
    const el=document.createElement("div");
    el.className="fitem"+(p===current?" active":"")+(missing?" missing":"");
    const ic=fileIcon(p,missing);
    el.innerHTML=`<span class="ic">${ic}</span><span>${basename(p)}</span>`+
      (missing?`<small>ausente</small>`:``);;
    el.onclick=()=>{ if(missing){ if(confirm(`Criar ${p}? Um \\input aponta para ele, mas o arquivo não existe.`)){ files[p]="% "+p+"\n"; openFile(p); buildTree(); setDirty(true);} return;} openFile(p); };
    tree.appendChild(el);
  };

  const order=Object.keys(groups).sort((a,b)=>{
    if(a===ROOT)return -1;if(b===ROOT)return 1;return a.localeCompare(b);});
  for(const folder of order){
    const g=document.createElement("div");g.className="grp";
    g.textContent=folder===ROOT?"raiz":folder+"/";
    tree.appendChild(g);
    groups[folder].sort().forEach(addItem);
  }
}

  current=p;cm.setValue(files[p]);cm.clearHistory();
  $("#crumb").innerHTML=p.includes("/")

/* ---------- 6. persistência ---------- */
async function persistEverything(){
  const d=await idb();
  await new Promise((res,rej)=>{
    const t=d.transaction(STORE,"readwrite"),s=t.objectStore(STORE);
    s.clear();
    for(const[k,v]of Object.entries(files))s.put(v,k);
    for(const[k,v]of Object.entries(binaries))s.put(v,"bin::"+k);
    if(GH.user)s.put(GH.user,"__gh_user");
    if(GH.repo)s.put(GH.repo,"__gh_repo");
    if(GH.token)s.put(GH.token,"__gh_token");
    if(GH.branch)s.put(GH.branch,"__gh_branch");
    t.oncomplete=()=>res();t.onerror=()=>rej(t.error);
  });
}
async function saveAll(){
  await persistEverything();
  setDirty(false);toast("Salvo no dispositivo");
}
async function load(){
  const stored=await dbAll();
  files={};binaries={};
  GH={user:stored["__gh_user"]||"",repo:stored["__gh_repo"]||"",
      token:stored["__gh_token"]||"",branch:stored["__gh_branch"]||"main"};
  delete stored["__gh_user"];delete stored["__gh_repo"];
  delete stored["__gh_token"];delete stored["__gh_branch"];
  if(Object.keys(stored).length){
    for(const[k,v]of Object.entries(stored)){
      if(k.startsWith("bin::"))binaries[k.slice(5)]=v;else files[k]=v;
    }
  }else{
    files={...SEED};await persistEverything();
  }
  rescanReferenced();buildTree();
  openFile(rootTex||Object.keys(files)[0]);
  /* ao carregar, tenta mostrar o último PDF gerado */
  tryLoadLastPdf();
}

/* --- log collapsible --- */
function logLine(msg,cls){

/* checagem local */
function preflight(){
  const missing=REFERENCED.filter(p=>!(p in files));
  if(missing.length){
    logLine("⚠ Resolva os \\input ausentes antes de compilar:","warn");
    missing.forEach(m=>logLine("   \\input{"+m.replace(/\.tex$/,"")+"} → "+m+" não existe.","warn"));
    logLine("");

/* helper de API */
async function gh(path,opts={}){
  const r=await fetch(GH_API+path,{...opts,headers:{
    "Authorization":"Bearer "+GH.token,
    "Accept":"application/vnd.github+json",
    "X-GitHub-Api-Version":"2022-11-28",
    ...(opts.headers||{})}});
  return r;
}

function b64encodeText(str){return btoa(unescape(encodeURIComponent(str)));}

async function makeBlob(contentB64){
  const r=await gh(`/repos/${GH.user}/${GH.repo}/git/blobs`,
    {method:"POST",body:JSON.stringify({content:contentB64,encoding:"base64"})});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error("blob: "+(e.message||r.status));}
  return (await r.json()).sha;
}

async function commitAll(onProgress){
  const base=`/repos/${GH.user}/${GH.repo}/git`;
  let parentSha=null,baseTree=null;
  const refR=await gh(`${base}/ref/heads/${GH.branch}`);
  if(refR.ok){
    parentSha=(await refR.json()).object.sha;
    const commitR=await gh(`${base}/commits/${parentSha}`);
    if(commitR.ok)baseTree=(await commitR.json()).tree.sha;
  }else if(refR.status!==404){
    throw new Error("ref: HTTP "+refR.status);
  }
  const entries=[];
  const all=[...Object.keys(files).map(p=>[p,b64encodeText(files[p])]),
             ...Object.keys(binaries).map(p=>[p,binaries[p]])];
  let done=0;
  for(const [path,b64] of all){
    const sha=await makeBlob(b64);
    entries.push({path,mode:"100644",type:"blob",sha});
    done++;onProgress&&onProgress(done,all.length,path);
  }
  const treeBody={tree:entries};if(baseTree)treeBody.base_tree=baseTree;
  const treeR=await gh(`${base}/trees`,{method:"POST",body:JSON.stringify(treeBody)});
  if(!treeR.ok)throw new Error("tree: HTTP "+treeR.status);
  const treeSha=(await treeR.json()).sha;
  const msg="Verso: atualiza o projeto ("+new Date().toLocaleString("pt-BR")+")";
  const commitBody={message:msg,tree:treeSha};
  if(parentSha)commitBody.parents=[parentSha];
  const commitR=await gh(`${base}/commits`,{method:"POST",body:JSON.stringify(commitBody)});
  if(!commitR.ok)throw new Error("commit: HTTP "+commitR.status);
  const newCommit=(await commitR.json()).sha;
  let updR=await gh(`${base}/refs/heads/${GH.branch}`,
    {method:"PATCH",body:JSON.stringify({sha:newCommit,force:false})});
  if(updR.status===404||updR.status===422){
    updR=await gh(`${base}/refs`,
      {method:"POST",body:JSON.stringify({ref:`refs/heads/${GH.branch}`,sha:newCommit})});
  }
  if(!updR.ok){const e=await updR.json().catch(()=>({}));throw new Error("push: "+(e.message||updR.status));}
  return newCommit;
}

/* fluxo principal: compilar PDF */
async function publish(){
  clearLog();
  if(!GH.user||!GH.repo||!GH.token){
    $("#previewPh").style.display="flex";$("#pdfframe").style.display="none";
    logLine("Conecte o GitHub primeiro (GitHub → Conectar GitHub).","err");
    logLine("");
    logLine("Informe: usuário, repositório, branch e token (Contents + Actions).","warn");
    toast("Conecte o GitHub primeiro");
    return;
  }
  if(!preflight()){toast("Há \\input ausentes");return;}
  $("#btnPublish").disabled=true;
  try{
    const total=Object.keys(files).length+Object.keys(binaries).length;
    logLine("Publicando "+total+" arquivos em "+GH.user+"/"+GH.repo+" ("+GH.branch+")…");
    const commitSha=await commitAll((d,t,p)=>{
      if(d===1||d===t||d%5===0)logLine("  enviando… ("+d+"/"+t+")");
    });
    logLine("Commit "+commitSha.slice(0,7)+" publicado. Aguardando compilação…","ok");
    await monitorRun(commitSha);
  }catch(e){
    logLine("Falha ao publicar: "+e.message,"err");
    if(/401|403|Bad credentials|Resource not accessible/i.test(e.message))
      logLine("Verifique o token (Contents: read/write e Actions: read).","warn");
    toast("Erro ao compilar");
  }finally{$("#btnPublish").disabled=false;}
}

async function monitorRun(commitSha){
  logLine("Aguardando o GitHub Actions iniciar…");
  let runId=null,runNum=null,tries=0;
  while(!runId&&tries<20){
    await sleep(3000);tries++;
    const r=await gh(`/repos/${GH.user}/${GH.repo}/actions/runs?branch=${GH.branch}&per_page=10`);
    if(r.ok){const j=await r.json();
      const run=(j.workflow_runs||[]).find(w=>!commitSha||w.head_sha===commitSha)
                ||(j.workflow_runs||[])[0];
      if(run&&(!commitSha||run.head_sha===commitSha)){
        runId=run.id;runNum=run.run_number;
        logLine("Run #"+runNum+" detectado…");
      }
    }
  }
  if(!runId){logLine("Run não detectado. Veja em github.com/"+GH.user+"/"+GH.repo+"/actions","warn");
    toast("Run do Actions não encontrado");return;}

  let status="queued",conclusion=null;
  while(status!=="completed"){
    await sleep(5000);
    const r=await gh(`/repos/${GH.user}/${GH.repo}/actions/runs/${runId}`);
    if(!r.ok){logLine("Erro ao consultar o run: HTTP "+r.status,"err");break;}
    const j=await r.json();status=j.status;conclusion=j.conclusion;
    logLine("  status: "+status+(conclusion?(" → "+conclusion):""));
  }

  if(conclusion!=="success"){
    logLine("Compilação falhou ("+conclusion+").","err");
    logLine("Log: github.com/"+GH.user+"/"+GH.repo+"/actions/runs/"+runId,"warn");
    notify("Compilação falhou","Actions terminou com: "+conclusion);
    toast("Compilação falhou");
    return;
  }

  logLine("Compilação concluída. Carregando PDF…","ok");
  await sleep(2500);
  try{
    const blob=await fetchReleasePdf();
    showPdfBlob(blob);
    logLine("PDF carregado no preview. ✓","ok");
    notify("PDF pronto ✓","Compilação concluída.");
    toast("PDF pronto");
    if(window.innerWidth<=880)switchTab("preview");
  }catch(e){
    logLine("Compilou, mas não foi possível baixar o PDF: "+e.message,"warn");
    logLine("Confira a Release \""+GH_TAG+"\" no repositório.","warn");
    notify("Compilação concluída","Abra a Release para ver o PDF.");
  }
}

function showPdfBlob(blob){
  const url=URL.createObjectURL(blob);
  $("#previewPh").style.display="none";
  const f=$("#pdfframe");f.style.display="block";f.src=url;
}

async function fetchReleasePdf(){
  const relR=await gh(`/repos/${GH.user}/${GH.repo}/releases/tags/${GH_TAG}`);
  if(!relR.ok)throw new Error("Release \""+GH_TAG+"\" não encontrada (HTTP "+relR.status+")");
  const rel=await relR.json();
  const wanted=pdfName();
  const asset=(rel.assets||[]).find(a=>a.name===wanted)
            ||(rel.assets||[]).find(a=>a.name.endsWith(".pdf"))
            ||(rel.assets||[])[0];
  if(!asset)throw new Error("a Release não tem PDF ainda");
  const dl=await fetch(GH_API+`/repos/${GH.user}/${GH.repo}/releases/assets/${asset.id}`,{
    headers:{"Authorization":"Bearer "+GH.token,"Accept":"application/octet-stream"}});
  if(!dl.ok)throw new Error("download do PDF: HTTP "+dl.status);
  return dl.blob();
}

/* ---------- 7d. varredura de \input ---------- */
function rescanReferenced(){
  detectRoot();
  const root=rootTex&&files[rootTex];
  if(!root){REFERENCED=[];buildTree();return;}
  const dir=rootTex.includes("/")?rootTex.slice(0,rootTex.lastIndexOf("/")+1):"";
  const refs=new Set();
  const re=/\\(?:input|include)\{([^}]+)\}/g;let m;
  while((m=re.exec(root))){
    let p=m[1].trim();
    if(!/\.\w+$/.test(p))p+=".tex";
    if(dir && !p.startsWith("/") && !(p in files))p=dir+p;
    refs.add(p.replace(/^\//,""));
  }
  REFERENCED=[...refs];
  buildTree();
}

/* ---------- 7e. importar .zip ---------- */
async function importZip(file){
  if(!window.JSZip){toast("Biblioteca de zip não carregou");return;}
  toast("Lendo "+file.name+"…");
  const zip=await JSZip.loadAsync(file);
  const newText={},newBin={};
  const paths=Object.keys(zip.files).filter(p=>!zip.files[p].dir);
  let prefix="";
  const top=paths[0]?.split("/")[0];
  if(top&&paths.every(p=>p.startsWith(top+"/")))prefix=top+"/";
  for(const raw of paths){
    const entry=zip.files[raw];
    const path=prefix?raw.slice(prefix.length):raw;
    if(!path)continue;
    if(isText(path)){newText[path]=await entry.async("string");}
    else{newBin[path]=await entry.async("base64");}
  }
  if(!Object.keys(newText).length){toast("Nenhum .tex encontrado no zip");return;}
  files=newText;binaries=newBin;
  await persistEverything();
  rescanReferenced();
  openFile(rootTex||Object.keys(files).find(p=>p.endsWith(".tex"))||Object.keys(files)[0]);
  setDirty(false);
  toast(Object.keys(files).length+" arquivos + "+Object.keys(binaries).length+" recursos");
}

/* ---------- 7f. sincronizar do GitHub ---------- */
async function pullFromGitHub(){
  if(!GH.user||!GH.repo||!GH.token){toast("Conecte o GitHub primeiro");return;}
  if(Object.keys(files).length>1&&dirty&&
     !confirm("Isso substitui o conteúdo local pelo do GitHub. Continuar?"))return;
  clearLog();
  logLine("Sincronizando "+GH.user+"/"+GH.repo+" ("+GH.branch+")…");
  $("#btnPull").disabled=true;
  try{
    const refR=await gh(`/repos/${GH.user}/${GH.repo}/git/ref/heads/${GH.branch}`);
    if(!refR.ok)throw new Error("branch \""+GH.branch+"\" não encontrado (HTTP "+refR.status+")");
    const commitSha=(await refR.json()).object.sha;
    const cR=await gh(`/repos/${GH.user}/${GH.repo}/git/commits/${commitSha}`);
    const treeSha=(await cR.json()).tree.sha;
    const tR=await gh(`/repos/${GH.user}/${GH.repo}/git/trees/${treeSha}?recursive=1`);
    if(!tR.ok)throw new Error("árvore: HTTP "+tR.status);
    const tree=(await tR.json()).tree.filter(n=>n.type==="blob");
    const skip=p=>p==="index.html"||p.startsWith(".github/")||p===".gitignore";
    const newText={},newBin={};let done=0;
    const blobs=tree.filter(n=>!skip(n.path));
    for(const n of blobs){
      const bR=await gh(`/repos/${GH.user}/${GH.repo}/git/blobs/${n.sha}`);
      if(!bR.ok)throw new Error(n.path+": HTTP "+bR.status);
      const b64=(await bR.json()).content.replace(/\n/g,"");
      if(isText(n.path)) newText[n.path]=decodeURIComponent(escape(atob(b64)));
      else newBin[n.path]=b64;
      done++;if(done===1||done===blobs.length||done%5===0)logLine("  baixando… ("+done+"/"+blobs.length+")");
    }
    if(!Object.keys(newText).length)throw new Error("nenhum arquivo de texto no repo");
    files=newText;binaries=newBin;
    await persistEverything();rescanReferenced();
    openFile(rootTex||Object.keys(files)[0]);
    setDirty(false);
    logLine("Sincronizado com o GitHub. ✓","ok");
    toast(Object.keys(files).length+" arquivos + "+Object.keys(binaries).length+" recursos");
    /* após sincronizar, carrega o último PDF */
    tryLoadLastPdf();
  }catch(e){
    logLine("Falha ao sincronizar: "+e.message,"err");
    if(/401|403|Bad credentials|Resource not accessible/i.test(e.message))
      logLine("Verifique o token (Contents: read).","warn");
    toast("Erro ao sincronizar");
  }finally{$("#btnPull").disabled=false;}
}

/* ---------- 9. resize handles ---------- */
(function(){
  const cols=$("#cols");

  function getWidths(){
    const style=getComputedStyle(cols);
    const parts=style.gridTemplateColumns.split(" ");
    /* parses "220px Xpx Ypx" */
    return parts.map(s=>parseFloat(s));
  }

  function positionHandles(){
    const style=getComputedStyle(cols);
    const parts=style.gridTemplateColumns.split(" ");
    const w0=parseFloat(parts[0]);
    const w1=parseFloat(parts[1]);
    const rh1=$("#rh1"), rh2=$("#rh2");
    rh1.style.left=(w0-2)+"px";
    rh2.style.left=(w0+w1-2)+"px";
  }

  function startResize(e,handle){
    e.preventDefault();
    handle.classList.add("dragging");
    const totalW=cols.offsetWidth;
    const startX=e.clientX;
    const style=getComputedStyle(cols);
    const parts=style.gridTemplateColumns.split(" ");
    const w0=parseFloat(parts[0]);
    const w1=parseFloat(parts[1]);
    const w2=parseFloat(parts[2]);

    function onMove(ev){
      const dx=ev.clientX-startX;
      const MIN=120;
      if(handle.id==="rh1"){
        const newW0=Math.max(MIN,w0+dx);
        const newW1=Math.max(MIN,w1-dx);
        if(newW0+newW1+MIN<=totalW){
          cols.style.gridTemplateColumns=newW0+"px "+newW1+"px 1fr";
        }
      } else {
        const newW1=Math.max(MIN,w1+dx);
        if(w0+newW1+MIN<=totalW){
          cols.style.gridTemplateColumns=w0+"px "+newW1+"px 1fr";
        }
      }
      positionHandles();
      cm.refresh();
    }
    function onUp(){
      handle.classList.remove("dragging");
      document.removeEventListener("mousemove",onMove);
      document.removeEventListener("mouseup",onUp);
    }
    document.addEventListener("mousemove",onMove);
    document.addEventListener("mouseup",onUp);
  }

  $("#rh1").addEventListener("mousedown",e=>startResize(e,$("#rh1")));
  $("#rh2").addEventListener("mousedown",e=>startResize(e,$("#rh2")));

  /* initial handle positions after layout paint */
  requestAnimationFrame(positionHandles);
  window.addEventListener("resize",positionHandles);
})();

/* ---------- 10. service worker ---------- */
if("serviceWorker"in navigator){
  const sw=`self.addEventListener("install",e=>self.skipWaiting());
  self.addEventListener("activate",e=>e.waitUntil(self.clients.claim()));
  self.addEventListener("fetch",e=>{
    e.respondWith(caches.open("lavoura-v1").then(async c=>{
      const hit=await c.match(e.request);
      try{const net=await fetch(e.request);c.put(e.request,net.clone());return net;}
      catch(_){return hit||Response.error();}
    }));
  });`;
  const url=URL.createObjectURL(new Blob([sw],{type:"text/javascript"}));
  navigator.serviceWorker.register(url).catch(()=>{});
}

load().then(()=>setTimeout(()=>cm.refresh(),60));
</script>
